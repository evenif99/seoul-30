name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
        env:
          # Provide minimal stubs so the build can resolve env references.
          # Real values are only needed at runtime.
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost/ci' }}
          NEXT_PUBLIC_BASE_URL: https://seoul-30.vercel.app
          USE_MOCK_DATA: true
          ENABLE_REALTIME_CITY_DATA: false
          ENABLE_CULTURE_EVENTS_API: false
